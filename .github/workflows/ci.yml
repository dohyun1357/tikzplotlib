name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly run (Mondays 06:00 UTC) so the latest-deps smoke job catches new
    # matplotlib/numpy releases that break tikzplotlib before users hit them.
    - cron: "0 6 * * 1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - uses: pre-commit/action@v3.0.1

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      # - name: Install system dependencies
      #   run: sudo apt-get install -y texlive-latex-base texlive-latex-extra context python3-tk
      - name: Run tests against the locked dependencies
        run: uv run --frozen pytest --cov tikzplotlib --cov-report xml --cov-report term
      - uses: codecov/codecov-action@v4
        if: ${{ matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest' }}

  smoke-latest:
    # Early-warning job: run the (output-agnostic) README examples against the
    # newest matplotlib/numpy, ignoring the lockfile. This surfaces upstream API
    # breakage without the cosmetic-diff noise of the exact-match golden tests.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Smoke-test the documented examples against the latest dependencies
        run: uv run --upgrade pytest README.md -v
